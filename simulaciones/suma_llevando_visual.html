<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Suma Llevando Visual</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #fffacd; text-align: center; }
        .board { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .column { width: 150px; min-height: 400px; border: 3px solid #8b4513; background-color: #fff; border-radius: 10px; position: relative; padding-top: 50px; display: flex; flex-direction: column-reverse; flex-wrap: wrap-reverse; align-content: center; }
        .col-header { position: absolute; top: 0; width: 100%; height: 40px; background-color: #deb887; font-weight: bold; line-height: 40px; border-bottom: 2px solid #8b4513; }
        
        .unit-block { width: 40px; height: 40px; background-color: #1e90ff; border: 1px solid #000; margin: 2px; }
        .ten-block { width: 40px; height: 100px; background-color: #ff4500; border: 1px solid #000; margin: 2px; display: flex; flex-direction: column; justify-content: space-evenly; }
        .ten-block div { width: 100%; height: 1px; background-color: rgba(0,0,0,0.3); }

        .controls { margin-top: 20px; border-top: 2px dashed #aaa; padding-top: 20px;}
        button { font-size: 1.2em; padding: 10px 20px; background-color: #32cd32; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .group-btn { background-color: #ff00ff; display: none; margin: 10px auto; animation: pulse 1s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>✨ Suma con Magia (Llevando) ✨</h1>
    <p>¡Si juntas 10 azules, se convierten en 1 roja!</p>

    <div class="board">
        <div class="column" id="col-tens">
            <div class="col-header">Decenas (10)</div>
        </div>
        <div class="column" id="col-units">
            <div class="col-header">Unidades (1)</div>
        </div>
    </div>

    <button id="groupBtn" class="group-btn" onclick="groupUnits()">✨ ¡AGRUPAR EN DECENA! ✨</button>

    <div class="controls">
        <button onclick="addUnit()">+ Agregar Unidad 🟦</button>
        <button onclick="reset()">Reiniciar</button>
    </div>

    <script>
        let units = 0;
        let tens = 0;

        function addUnit() {
            units++;
            render();
        }

        function groupUnits() {
            if (units >= 10) {
                units -= 10;
                tens++;
                render();
            }
        }

        function render() {
            // Units
            const colU = document.getElementById('col-units');
            // Keep header
            colU.innerHTML = '<div class="col-header">Unidades (1)</div>';
            for(let i=0; i<units; i++) {
                let d = document.createElement('div');
                d.className = 'unit-block';
                d.innerText = '1';
                colU.appendChild(d);
            }

            // Tens
            const colT = document.getElementById('col-tens');
            colT.innerHTML = '<div class="col-header">Decenas (10)</div>';
            for(let i=0; i<tens; i++) {
                let d = document.createElement('div');
                d.className = 'ten-block';
                d.innerText = '10';
                colT.appendChild(d);
            }

            // Button visibility
            const btn = document.getElementById('groupBtn');
            if (units >= 10) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }
        
        function reset() {
            units = 0;
            tens = 0;
            render();
        }
    </script>
</body>
</html>
