<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimenta al Cocodrilo</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #e8f5e9; }
        .container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 50px; }
        .plate { width: 150px; height: 150px; background-color: white; border: 5px solid #ccc; border-radius: 50%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; padding: 10px; cursor: pointer; transition: transform 0.2s; }
        .plate:hover { transform: scale(1.05); border-color: #888; }
        .food { font-size: 30px; margin: 2px; }
        #crocodile { font-size: 100px; transition: transform 0.5s; cursor: pointer; }
        #message { font-size: 1.5em; margin-top: 20px; font-weight: bold; height: 30px; }
        button { margin-top: 30px; padding: 10px 20px; font-size: 1.2em; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <h1>🐊 ¿Quién tiene MÁS comida?</h1>
    <p>Haz clic en el plato que tiene <strong>MÁS</strong> comida para que el cocodrilo se la coma.</p>

    <div class="container">
        <div id="plate-left" class="plate" onclick="checkAnswer('left')"></div>
        <div id="crocodile">🐊</div>
        <div id="plate-right" class="plate" onclick="checkAnswer('right')"></div>
    </div>

    <div id="message"></div>
    <button onclick="nextRound()">Siguiente Plato</button>

    <script>
        const plateLeft = document.getElementById('plate-left');
        const plateRight = document.getElementById('plate-right');
        const croc = document.getElementById('crocodile');
        const msg = document.getElementById('message');
        
        let countLeft = 0;
        let countRight = 0;

        function randomFood() {
            const foods = ['🍔', '🍕', '🍎', '🍗', '🍩', '🥕'];
            return foods[Math.floor(Math.random() * foods.length)];
        }

        function generatePlate(element) {
            element.innerHTML = '';
            const count = Math.floor(Math.random() * 8) + 1; // 1 to 9
            for(let i=0; i<count; i++) {
                const span = document.createElement('span');
                span.classList.add('food');
                span.innerText = randomFood();
                element.appendChild(span);
            }
            return count;
        }

        function nextRound() {
            msg.innerText = "";
            croc.style.transform = "rotate(0deg) scale(1)";
            
            // Ensure numbers are different
            do {
                countLeft = generatePlate(plateLeft);
                countRight = generatePlate(plateRight);
            } while (countLeft === countRight);
        }

        function checkAnswer(side) {
            const isLeftGreater = countLeft > countRight;
            const isRightGreater = countRight > countLeft;

            if (side === 'left') {
                if (isLeftGreater) {
                    correct('left');
                } else {
                    wrong();
                }
            } else {
                if (isRightGreater) {
                    correct('right');
                } else {
                    wrong();
                }
            }
        }

        function correct(side) {
            msg.innerText = "¡ÑAM ÑAM! ¡Delicioso! 😋";
            msg.style.color = "green";
            if(side === 'left') {
                croc.style.transform = "rotateY(180deg) scale(1.2)"; // Face left
            } else {
                croc.style.transform = "rotateY(0deg) scale(1.2)"; // Face right (default)
            }
        }

        function wrong() {
            msg.innerText = "¡Mmm... ahí hay poca comida! 🤢";
            msg.style.color = "red";
            croc.style.transform = "scale(0.8) rotate(10deg)";
        }

        nextRound();
    </script>
</body>
</html>
