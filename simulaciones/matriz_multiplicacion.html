<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matriz de Multiplicación</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #fafafa; }
        .grid-container { 
            display: grid; 
            gap: 2px; 
            margin: 20px auto; 
            width: fit-content; 
            padding: 10px; 
            background: #eee; 
            border: 2px solid #ccc; 
        }
        .cell { 
            width: 40px; height: 40px; 
            background-color: white; 
            border: 1px solid #ddd; 
            transition: background 0.2s; 
        }
        .cell.active { background-color: #ffca28; border-color: #ffca28; }
        input { font-size: 1.5em; width: 60px; text-align: center; margin: 5px; }
        .label { font-size: 1.5em; font-weight: bold; margin: 10px; }
        #result { font-size: 2em; margin-top: 20px; color: #d84315; }
    </style>
</head>
<body>

    <h1>✖️ El Rectángulo Mágico</h1>
    <p>Cambia los números para ver cómo crece el rectángulo.</p>

    <div>
        <input type="number" id="rows" min="1" max="10" value="2" onchange="drawGrid()"> 
        <span class="label">Filas</span> 
        x 
        <input type="number" id="cols" min="1" max="10" value="3" onchange="drawGrid()"> 
        <span class="label">Columnas</span>
    </div>

    <div id="grid" class="grid-container"></div>

    <div id="result">2 x 3 = 6</div>

    <script>
        const grid = document.getElementById('grid');
        const result = document.getElementById('result');

        function drawGrid() {
            let r = parseInt(document.getElementById('rows').value);
            let c = parseInt(document.getElementById('cols').value);
            
            // Limits
            if(r < 1) r = 1; if(r > 10) r = 10;
            if(c < 1) c = 1; if(c > 10) c = 10;
            document.getElementById('rows').value = r;
            document.getElementById('cols').value = c;

            grid.style.gridTemplateColumns = `repeat(${c}, 40px)`;
            grid.innerHTML = '';

            for(let i=0; i < r * c; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.classList.add('active');
                
                // Add cat emoji randomly for fun
                if(Math.random() > 0.8) cell.innerText = "🐱";
                
                grid.appendChild(cell);
            }

            result.innerText = `${r} x ${c} = ${r * c}`;
        }

        drawGrid();
    </script>
</body>
</html>
