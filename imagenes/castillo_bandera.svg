<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes wave {
      0% { d: path("M100,20 Q120,30 140,20 L140,50 Q120,60 100,50 Z"); }
      50% { d: path("M100,20 Q120,10 140,20 L140,50 Q120,40 100,50 Z"); }
      100% { d: path("M100,20 Q120,30 140,20 L140,50 Q120,60 100,50 Z"); }
    }
  </style>

  <!-- Castle Base -->
  <rect x="50" y="100" width="100" height="80" fill="#4488ff" stroke="black"/>
  <rect x="50" y="80" width="20" height="20" fill="#4488ff" stroke="black"/>
  <rect x="90" y="80" width="20" height="20" fill="#4488ff" stroke="black"/>
  <rect x="130" y="80" width="20" height="20" fill="#4488ff" stroke="black"/>
  
  <!-- Door -->
  <path d="M85,180 L85,140 A15,15 0 0,1 115,140 L115,180" fill="#8B4513" stroke="black"/>
  
  <!-- Flag Pole -->
  <line x1="100" y1="80" x2="100" y2="20" stroke="black" stroke-width="2"/>
  
  <!-- Waving Flag -->
  <path d="M100,20 Q120,30 140,20 L140,50 Q120,60 100,50 Z" fill="red" stroke="black" style="animation: wave 1s infinite linear;"/>

  <text x="60" y="195" font-family="Arial" font-size="12">Castillo de Centenas</text>
</svg>
