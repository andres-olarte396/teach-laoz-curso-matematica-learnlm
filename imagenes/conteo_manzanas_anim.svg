<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    .apple { transform-origin: center; }
    @keyframes drop {
      0% { transform: translateY(-100px); opacity: 0; }
      50% { transform: translateY(0); opacity: 1; }
      60% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
  </style>

  <!-- Ground -->
  <line x1="10" y1="130" x2="190" y2="130" stroke="green" stroke-width="5"/>

  <!-- Apple 1 -->
  <g class="apple" style="animation: drop 1s forwards ease-out;">
    <circle cx="50" cy="110" r="15" fill="red" stroke="darkred"/>
    <path d="M50,95 Q60,90 60,85" stroke="brown" stroke-width="2" fill="none"/>
    <text x="45" y="115" fill="white" font-size="12" font-family="Arial">1</text>
  </g>

  <!-- Apple 2 -->
  <g class="apple" style="animation: drop 1s forwards ease-out; animation-delay: 1s; opacity: 0">
    <circle cx="100" cy="110" r="15" fill="red" stroke="darkred"/>
    <path d="M100,95 Q110,90 110,85" stroke="brown" stroke-width="2" fill="none"/>
    <text x="95" y="115" fill="white" font-size="12" font-family="Arial">2</text>
  </g>

  <!-- Apple 3 -->
  <g class="apple" style="animation: drop 1s forwards ease-out; animation-delay: 2s; opacity: 0">
    <circle cx="150" cy="110" r="15" fill="red" stroke="darkred"/>
    <path d="M150,95 Q160,90 160,85" stroke="brown" stroke-width="2" fill="none"/>
    <text x="145" y="115" fill="white" font-size="12" font-family="Arial">3</text>
  </g>
</svg>
