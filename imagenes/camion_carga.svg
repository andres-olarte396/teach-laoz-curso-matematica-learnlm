<svg width="250" height="150" viewBox="0 0 250 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes moveCrane {
      0% { transform: translateX(0); }
      50% { transform: translateX(100px); }
      100% { transform: translateX(0); }
    }
    @keyframes lift {
      0% { transform: translateY(0); }
      25% { transform: translateY(-30px); }
      75% { transform: translateY(-30px); }
      100% { transform: translateY(0); }
    }
  </style>

  <!-- Crane Body -->
  <rect x="20" y="80" width="60" height="40" fill="orange" stroke="black"/>
  <circle cx="35" cy="120" r="10" fill="black"/>
  <circle cx="65" cy="120" r="10" fill="black"/>

  <!-- Crane Arm -->
  <line x1="50" y1="80" x2="50" y2="40" stroke="black" stroke-width="5"/>
  <line x1="50" y1="40" x2="150" y2="40" stroke="black" stroke-width="5"/>
  
  <!-- Hook and Block Group -->
  <g style="animation: moveCrane 4s infinite linear;">
    <g style="animation: lift 4s infinite linear;">
      <line x1="50" y1="40" x2="50" y2="70" stroke="black" stroke-width="2"/>
      <!-- Block 10 -->
      <rect x="40" y="70" width="20" height="20" fill="red" stroke="black"/>
      <text x="42" y="85" font-size="10" fill="white">10</text>
    </g>
  </g>
  
  <text x="150" y="100" font-family="Arial" font-size="12">¡Me llevo una!</text>
</svg>
