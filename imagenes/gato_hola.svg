<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Head -->
  <circle cx="100" cy="100" r="80" fill="#ffa500" stroke="#d2691e" stroke-width="5"/>
  <!-- Ears -->
  <polygon points="40,50 20,10 80,40" fill="#ffa500" stroke="#d2691e" stroke-width="5"/>
  <polygon points="160,50 180,10 120,40" fill="#ffa500" stroke="#d2691e" stroke-width="5"/>
  <!-- Eyes -->
  <ellipse cx="70" cy="90" rx="10" ry="20" fill="white"/>
  <circle cx="70" cy="90" r="5" fill="black"/>
  <ellipse cx="130" cy="90" rx="10" ry="20" fill="white"/>
  <circle cx="130" cy="90" r="5" fill="black"/>
  <!-- Nose -->
  <polygon points="90,120 110,120 100,130" fill="pink"/>
  <!-- Mouth -->
  <path d="M100,130 Q80,150 70,140" stroke="black" stroke-width="3" fill="none"/>
  <path d="M100,130 Q120,150 130,140" stroke="black" stroke-width="3" fill="none"/>
  <!-- Whiskers -->
  <line x1="40" y1="120" x2="80" y2="120" stroke="black" stroke-width="2"/>
  <line x1="40" y1="130" x2="80" y2="135" stroke="black" stroke-width="2"/>
  <line x1="160" y1="120" x2="120" y2="120" stroke="black" stroke-width="2"/>
  <line x1="160" y1="130" x2="120" y2="135" stroke="black" stroke-width="2"/>
</svg>
