<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes spinHours {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinMinutes {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Clock Face -->
  <circle cx="100" cy="100" r="80" fill="white" stroke="black" stroke-width="5"/>
  <text x="90" y="40" font-family="Arial" font-size="20">12</text>
  <text x="160" y="105" font-family="Arial" font-size="20">3</text>
  <text x="95" y="170" font-family="Arial" font-size="20">6</text>
  <text x="30" y="105" font-family="Arial" font-size="20">9</text>

  <!-- Hands Group (Centered) -->
  <g transform="translate(100, 100)">
    <!-- Hour Hand -->
    <line x1="0" y1="0" x2="0" y2="-40" stroke="blue" stroke-width="6" stroke-linecap="round" style="animation: spinHours 12s linear infinite;">
    </line>
    <!-- Minute Hand -->
    <line x1="0" y1="0" x2="0" y2="-60" stroke="red" stroke-width="4" stroke-linecap="round" style="animation: spinMinutes 1s linear infinite;">
    </line>
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="5" fill="black"/>
  </g>
</svg>
