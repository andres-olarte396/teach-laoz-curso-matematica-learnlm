<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes search {
      0% { transform: translate(0, 0) rotate(0deg); }
      25% { transform: translate(20px, -20px) rotate(10deg); }
      50% { transform: translate(-20px, 20px) rotate(-10deg); }
      75% { transform: translate(-20px, -20px) rotate(5deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
  </style>

  <g transform="translate(100, 100)">
    <g style="animation: search 4s infinite ease-in-out;">
      <!-- Handle -->
      <rect x="-10" y="40" width="20" height="60" fill="#8B4513" rx="5"/>
      <!-- Rim -->
      <circle cx="0" cy="0" r="45" stroke="silver" stroke-width="10" fill="lightblue" fill-opacity="0.3"/>
      <!-- Glass reflection -->
      <path d="M-25,-25 Q-10,-40 5,-25" stroke="white" stroke-width="3" fill="none" opacity="0.6"/>
    </g>
  </g>
  
  <!-- "Bug" being found -->
  <circle cx="120" cy="80" r="5" fill="red" />
  <circle cx="80" cy="120" r="5" fill="blue" />
</svg>
