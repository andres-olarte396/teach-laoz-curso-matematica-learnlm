<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes openBox {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
      100% { transform: scaleY(0.1); } 
      /* Lid opens */
    }
  </style>

  <!-- Box Body -->
  <rect x="50" y="80" width="100" height="80" fill="#CD853F" stroke="black"/>
  <text x="75" y="130" font-family="Arial" font-size="20">10 🍪</text>
  
  <!-- Lid -->
  <g transform="translate(50, 80)">
    <rect x="0" y="-10" width="100" height="10" fill="#8B4513" stroke="black" style="animation: openBox 3s infinite alternate; transform-origin: bottom;"/>
  </g>

  <!-- Single Cookie coming out -->
  <circle cx="160" cy="120" r="10" fill="#D2691E" stroke="brown"/>
  <text x="175" y="125" font-size="20">⬅️</text>
  
  <text x="20" y="50" font-family="Arial" font-size="12">¡Abrimos una caja de 10!</text>
</svg>
