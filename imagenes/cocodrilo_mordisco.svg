<svg width="200" height="150" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes chomp {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-15deg); } /* Upper jaw opens */
    }
    @keyframes chompBottom {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(15deg); } /* Lower jaw opens */
    }
    @keyframes eyeMove {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(2px); }
    }
  </style>

  <g transform="translate(50, 75)">
    <!-- Upper Jaw -->
    <g style="animation: chomp 1s infinite;">
      <path d="M0,0 L80,-30 L80,0 Z" fill="#228B22" stroke="black"/>
      <circle cx="50" cy="-20" r="5" fill="white"/>
      <circle cx="50" cy="-20" r="2" fill="black" style="animation: eyeMove 1s infinite;"/>
      <!-- Teeth -->
      <polygon points="20,0 25,5 30,0 35,5 40,0" fill="white"/>
    </g>

    <!-- Lower Jaw -->
    <g style="animation: chompBottom 1s infinite;">
      <path d="M0,0 L80,30 L80,0 Z" fill="#228B22" stroke="black"/>
      <!-- Teeth -->
      <polygon points="20,0 25,-5 30,0 35,-5 40,0" fill="white"/>
    </g>

    <!-- Body Hint -->
    <path d="M80,-20 Q120,0 140,0 L140,20 Q120,20 80,20" fill="#228B22" stroke="black"/>
    
    <!-- Sign -->
    <text x="-30" y="10" font-family="Arial" font-size="40" font-weight="bold" fill="orange">&lt;</text>
  </g>
</svg>
