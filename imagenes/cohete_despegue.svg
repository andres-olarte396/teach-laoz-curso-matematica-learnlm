<svg width="200" height="300" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes shake {
      0% { transform: translate(1px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(3px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(3px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(1px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }
    @keyframes fire {
      0% { height: 20px; fill: yellow; }
      50% { height: 40px; fill: orange; }
      100% { height: 20px; fill: red; }
    }
    @keyframes sky {
        0% { transform: translateY(0); }
        100% { transform: translateY(300px); }
    }
  </style>

  <!-- Stars falling (simulating ascent) -->
  <g style="animation: sky 2s linear infinite;">
     <circle cx="50" cy="-50" r="2" fill="white"/>
     <circle cx="150" cy="0" r="2" fill="white"/>
     <circle cx="20" cy="-100" r="2" fill="white"/>
  </g>

  <g transform="translate(100, 150)" style="animation: shake 0.5s infinite;">
    <!-- Rocket Body -->
    <ellipse cx="0" cy="0" rx="30" ry="80" fill="#EEEEEE" stroke="black" stroke-width="2"/>
    <circle cx="0" cy="-20" r="15" fill="#87CEEB" stroke="gray" stroke-width="2"/> <!-- Window -->
    
    <!-- Fins -->
    <path d="M-30,40 L-50,80 L-20,70 Z" fill="red" stroke="black"/>
    <path d="M30,40 L50,80 L20,70 Z" fill="red" stroke="black"/>
    
    <!-- Fire -->
    <g transform="translate(0, 80)">
       <polygon points="-10,0 10,0 0,30" style="animation: fire 0.2s infinite;"/>
    </g>
  </g>
</svg>
