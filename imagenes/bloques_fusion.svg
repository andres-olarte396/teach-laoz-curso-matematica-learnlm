<svg width="200" height="250" viewBox="0 0 200 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes stack {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(50px); opacity: 0; }
    }
    @keyframes appear {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>

  <g transform="translate(20, 200)">
    <!-- 10 Small Blocks (Unidades) -->
    <rect x="0" y="0" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.1s"/>
    <rect x="25" y="0" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.2s"/>
    <rect x="50" y="0" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.3s"/>
    <rect x="75" y="0" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.4s"/>
    <rect x="0" y="-25" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.5s"/>
    <rect x="25" y="-25" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.6s"/>
    <rect x="50" y="-25" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.7s"/>
    <rect x="75" y="-25" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.8s"/>
    <rect x="100" y="0" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 0.9s"/>
    <rect x="100" y="-25" width="20" height="20" fill="#4488ff" stroke="black" style="animation: stack 2s forwards; animation-delay: 1.0s"/>
    
    <text x="0" y="40" font-family="Arial" font-size="12">10 Unidades</text>
  </g>

  <!-- Arrow -->
  <path d="M80,180 L120,180 L115,175 M120,180 L115,185" stroke="black" stroke-width="2" />

  <g transform="translate(140, 100)">
    <!-- 1 Tower (Decena) appearing -->
    <rect x="0" y="0" width="20" height="200" fill="#ff4444" stroke="black" style="animation: appear 1s forwards; animation-delay: 2s; opacity: 0;"/>
    <line x1="0" y1="20" x2="20" y2="20" stroke="black"/>
    <line x1="0" y1="40" x2="20" y2="40" stroke="black"/>
    <line x1="0" y1="60" x2="20" y2="60" stroke="black"/>
    <line x1="0" y1="80" x2="20" y2="80" stroke="black"/>
    <line x1="0" y1="100" x2="20" y2="100" stroke="black"/>
    <line x1="0" y1="120" x2="20" y2="120" stroke="black"/>
    <line x1="0" y1="140" x2="20" y2="140" stroke="black"/>
    <line x1="0" y1="160" x2="20" y2="160" stroke="black"/>
    <line x1="0" y1="180" x2="20" y2="180" stroke="black"/>
    
    <text x="-10" y="220" font-family="Arial" font-size="12">1 Decena</text>
  </g>
</svg>
