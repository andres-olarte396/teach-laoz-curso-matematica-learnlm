<svg width="300" height="100" viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes blinkRed {
      0%, 100% { fill-opacity: 0.3; }
      50% { fill-opacity: 1; }
    }
    @keyframes blinkGreen {
      0%, 100% { fill-opacity: 1; }
      50% { fill-opacity: 0.3; }
    }
  </style>

  <rect x="0" y="20" width="300" height="60" fill="#333" rx="10"/>

  <!-- Light 1: Red -->
  <circle cx="50" cy="50" r="20" fill="red" stroke="black" stroke-width="2" style="animation: blinkRed 1s infinite;"/>
  
  <!-- Light 2: Green -->
  <circle cx="110" cy="50" r="20" fill="#00FF00" stroke="black" stroke-width="2" style="animation: blinkGreen 1s infinite;"/>

  <!-- Light 3: Red -->
  <circle cx="170" cy="50" r="20" fill="red" stroke="black" stroke-width="2" style="animation: blinkRed 1s infinite;"/>

  <!-- Light 4: Green -->
  <circle cx="230" cy="50" r="20" fill="#00FF00" stroke="black" stroke-width="2" style="animation: blinkGreen 1s infinite;"/>

  <text x="100" y="95" fill="white" font-family="Arial" font-size="12">Rojo - Verde - Rojo - Verde...</text>
</svg>
