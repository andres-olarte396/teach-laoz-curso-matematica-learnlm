<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes peek {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
    }
    @keyframes eyes {
      0%, 45%, 55%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.1); }
    }
  </style>
  
  <!-- Box -->
  <rect x="50" y="100" width="100" height="80" fill="#8B4513" stroke="black" stroke-width="2"/>
  <text x="75" y="150" font-family="Arial" font-size="20" fill="white">CAJA</text>

  <!-- Cat Group -->
  <g transform="translate(0, 0)">
    <g style="animation: peek 3s infinite ease-in-out;">
      <!-- Head -->
      <circle cx="100" cy="100" r="30" fill="orange" stroke="black"/>
      <!-- Ears -->
      <polygon points="80,80 70,60 90,75" fill="orange" stroke="black"/>
      <polygon points="120,80 130,60 110,75" fill="orange" stroke="black"/>
      <!-- Eyes (Blinking) -->
      <g style="animation: eyes 4s infinite;">
        <circle cx="90" cy="95" r="3" fill="black"/>
        <circle cx="110" cy="95" r="3" fill="black"/>
      </g>
      <!-- Nose -->
      <circle cx="100" cy="105" r="2" fill="pink"/>
    </g>
  </g>
  
  <!-- Box Front (to cover cat bottom) -->
  <rect x="50" y="100" width="100" height="80" fill="#CD853F" stroke="black" stroke-width="2" opacity="0.9"/>
</svg>
